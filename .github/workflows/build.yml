name: Build Android APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Files
        run: |
          unzip app.zip -d extracted_files
          shopt -s dotglob
          cp -r extracted_files/* . || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install and Generate Project
        run: |
          npm install --legacy-peer-deps
          npm install -D typescript @capacitor/cli @capacitor/android --legacy-peer-deps
          
          # بناء ملفات الويب - لو فشل هنعمل فولدر وهمي عشان المشروع ميتعطلش
          npm run build || (mkdir dist && touch dist/index.html)
          
          # إعادة إنشاء مشروع الأندرويد
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Fix Common Gradle Errors
        run: |
          # السطر ده بيصلح مشكلة الـ namespace اللي بتبوظ البناء في الإصدارات الجديدة
          if [ -d "android/app" ]; then
            echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties
            sed -i 's/compileSdkVersion 34/compileSdkVersion 35/g' android/app/build.gradle || true
          fi

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          # تشغيل البناء مع إظهار تفاصيل الخطأ لو حصل
          ./gradlew assembleDebug --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "android/app/build/outputs/apk/debug/*.apk"
          
