name: Build Android APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Files
        run: |
          unzip app.zip -d extracted_files
          shopt -s dotglob
          cp -r extracted_files/* . || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install and Generate Android Project
        run: |
          # استخدمنا --legacy-peer-deps عشان نحل خناقة إصدارات المكتبات
          npm install --legacy-peer-deps
          
          # تثبيت الأدوات اللازمة للبناء
          npm install -D typescript @capacitor/cli @capacitor/android --legacy-peer-deps
          
          # بناء ملفات الويب
          npm run build || mkdir www || mkdir dist
          
          # مسح فولدر اندرويد القديم وعمله من جديد بشكل نضيف
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "android/app/build/outputs/apk/debug/*.apk"
          
