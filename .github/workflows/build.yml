name: Build Android APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Files
        run: |
          unzip app.zip -d extracted_files
          shopt -s dotglob
          cp -r extracted_files/* . || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install and Generate Android Project
        run: |
          # 1. تثبيت الاعتمادات
          npm install
          npm install -D typescript @capacitor/cli @capacitor/android
          
          # 2. بناء ملفات الويب أولاً (مهم جداً)
          npm run build || mkdir www || mkdir dist
          
          # 3. مسح فولدر اندرويد القديم (اللي فيه README بس) وعمله من جديد
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          # بناء النسخة الـ Debug عشان نتخطى مشاكل التوقيع (Sign) حالياً
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "android/app/build/outputs/apk/debug/*.apk"
          
