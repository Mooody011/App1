name: Build Android APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Files
        run: |
          unzip app.zip -d extracted_files
          shopt -s dotglob
          cp -r extracted_files/* . || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install and Generate Project
        run: |
          # حل تعارض المكتبات
          npm install --legacy-peer-deps
          npm install -D typescript @capacitor/cli @capacitor/android --legacy-peer-deps
          
          # بناء ملفات الويب
          npm run build || (mkdir dist && touch dist/index.html)
          
          # إنشاء مشروع الأندرويد
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Upgrade Gradle and Fix Configuration
        run: |
          cd android
          # تحديث محرك Gradle عشان يوافق Java 17
          ./gradlew wrapper --gradle-version 8.7
          
          # تفعيل الـ BuildConfig وتحديث الـ SDK لتوافق أندرويد 15/16
          echo "android.defaults.buildfeatures.buildconfig=true" >> gradle.properties
          sed -i 's/compileSdkVersion 34/compileSdkVersion 35/g' app/build.gradle || true
          sed -i 's/targetSdkVersion 34/targetSdkVersion 35/g' app/build.gradle || true

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          # بناء التطبيق مع تجاهل أخطاء التوقيع حالياً
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "android/app/build/outputs/apk/debug/*.apk"
          
