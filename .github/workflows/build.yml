name: Build Android APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Files
        run: |
          # التعديل هنا: ضفنا شرطتين قبل الاسم عشان السيرفر ميتلخبطش
          unzip -- --apk-builder.zip -d extracted_files
          shopt -s dotglob
          cp -r extracted_files/* . || true
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          chmod +x scripts/*.sh || true
          # هندور على ملف البناء ونشغله مهما كان مكانه
          SCRIPT_PATH=$(find . -name "build-apk.sh" | head -n 1)
          if [ -f "$SCRIPT_PATH" ]; then
            chmod +x "$SCRIPT_PATH"
            $SCRIPT_PATH
          else
            echo "الملف build-apk.sh مش موجود"
            ls -R
          fi
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/*.apk"
          
