name: Build Android APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Files
        run: |
          unzip app.zip -d extracted_files
          # نقل كل الملفات للمسار الرئيسي حتى لو جوه فولدرات فرعية
          find extracted_files -maxdepth 2 -name "package.json" -execdir cp -r . ../../ \; || true
          cp -r extracted_files/* . || true
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install
          npm install -D typescript
          
      - name: Build APK
        run: |
          # البحث عن مكان ملف gradlew الحقيقي والدخول للفولدر بتاعه
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -n "$GRADLEW_PATH" ]; then
            GRADLE_DIR=$(dirname "$GRADLEW_PATH")
            cd "$GRADLE_DIR"
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "المعذرة، ملف gradlew مش موجود في أي مكان"
            ls -R
            exit 1
          fi
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/*.apk"
          
