name: Build Android APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Files
        run: |
          unzip app.zip -d extracted_files
          shopt -s dotglob
          cp -r extracted_files/* . || true
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install
          npm install -D typescript
          
      - name: Build APK
        run: |
          # المرة دي بنقول للسيرفر يدخل جوه فولدر android عشان يلاقي ملف البناء
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleRelease || ./gradlew assembleDebug
          else
            # لو الملف في مكان تاني، الكود ده هيدور عليه ويشغله
            SCRIPT_PATH=$(find . -name "build-apk.sh" | head -n 1)
            if [ -n "$SCRIPT_PATH" ]; then
              chmod +x "$SCRIPT_PATH"
              $SCRIPT_PATH
            else
              echo "فولدر android أو ملف البناء مش موجود"
              ls -R
            fi
          fi
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/*.apk"
          
