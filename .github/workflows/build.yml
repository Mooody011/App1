name: Build Android APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Files
        run: |
          unzip app.zip -d extracted_files
          shopt -s dotglob
          cp -r extracted_files/* . || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          # استخدام force عشان نحل أي تعارض في المكتبات
          npm install --force
          npm install -g @capacitor/cli @capacitor/android
          
      - name: Web Build
        run: |
          # لازم نعمل بناء لملفات الويب الأول لأن Capacitor بيحتاجها
          npm run build || (mkdir -p dist && echo "<html></html>" > dist/index.html)

      - name: Initialize Android Project
        run: |
          # مسح أي فولدر قديم وبدء مشروع نضيف
          rm -rf android
          npx cap add android
          
      - name: Force Gradle Update
        run: |
          # تحديث نسخة Gradle يدوياً في ملف الإعدادات لضمان التوافق مع Java 17
          sed -i 's/gradle-8.2-bin.zip/gradle-8.7-bin.zip/g' android/gradle/wrapper/gradle-wrapper.properties || true
          
          # تفعيل الـ BuildConfig المهمة لأندرويد 15
          echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          # بناء نسخة الـ Debug
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "android/app/build/outputs/apk/debug/*.apk"
          
